<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Aulas</title>
    
    <!-- Configurações PWA e Mobile -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563eb' } } }
        }
    </script>
    
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SheetJS para Exportação XLS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- jsPDF e AutoTable para Exportação PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        /* Transições suaves */
        body { transition: background-color 0.3s, color 0.3s; }
        .sidebar-transition { transition: transform 0.3s ease-in-out, margin-left 0.3s ease-in-out; }
        /* Recolher sidebar no Desktop */
        .sidebar-closed-desktop { margin-left: -18rem !important; } 
        /* Esconder barra de rolagem mas manter funcionalidade */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 h-screen overflow-hidden flex">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-50 dark:bg-gray-900">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg w-96 max-w-[90%]">
            <h2 class="text-2xl font-bold mb-6 text-center text-primary">Controle de Aulas Pro</h2>
            <input type="email" id="email" placeholder="E-mail" class="w-full mb-4 p-3 border rounded dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
            <input type="password" id="password" placeholder="Senha" class="w-full mb-6 p-3 border rounded dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
            <button onclick="handleLogin()" class="w-full bg-primary text-white p-3 rounded font-semibold hover:bg-blue-700 transition">Entrar</button>
        </div>
    </div>

    <!-- APLICATIVO PRINCIPAL -->
    <div id="app-screen" class="hidden flex w-full h-full">
        
        <!-- OVERLAY MOBILE -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden"></div>

        <!-- ABA LATERAL (SIDEBAR) -->
        <aside id="sidebar" class="bg-white dark:bg-gray-800 w-72 flex-shrink-0 h-full shadow-lg fixed lg:static z-30 sidebar-transition -translate-x-full lg:translate-x-0 flex flex-col border-r border-gray-200 dark:border-gray-700">
            <div class="p-5 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h1 class="text-xl font-bold text-primary">Controle de Aulas</h1>
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>

            <!-- Lista de Anos e Meses -->
            <div class="flex-1 overflow-y-auto no-scrollbar p-4" id="sidebar-content">
                <!-- Conteúdo gerado dinamicamente -->
            </div>

            <!-- Resumo Dinâmico do Mês -->
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
                <h3 id="summary-label" class="font-semibold mb-2 text-primary">Resumo do Mês</h3>
                <div class="flex justify-between text-sm">
                    <span>Aulas: <span id="total-hours" class="font-bold">0</span></span>
                    <span>Ganho: R$ <span id="total-earned" class="font-bold">0,00</span></span>
                </div>
            </div>

            <!-- Controles Inferiores (Tema) -->
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button onclick="toggleTheme()" class="w-full flex items-center justify-center gap-2 p-2 rounded bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    <span class="dark:hidden">Modo Escuro</span>
                    <span class="hidden dark:block">Modo Claro</span>
                </button>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="flex-1 flex flex-col h-full bg-gray-50 dark:bg-gray-900 overflow-hidden">
            <!-- Header -->
            <header class="h-16 bg-white dark:bg-gray-800 shadow-sm flex items-center justify-between px-4 z-10">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white p-2">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h2 id="current-view-title" class="text-lg font-semibold">Selecione um mês</h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToPDF()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded shadow flex items-center gap-2 text-sm transition" title="Exportar PDF">
                        <i class="fas fa-file-pdf"></i> <span class="hidden sm:inline">PDF</span>
                    </button>
                    <button onclick="exportToXLS()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded shadow flex items-center gap-2 text-sm transition" title="Exportar Excel">
                        <i class="fas fa-file-excel"></i> <span class="hidden sm:inline">Excel</span>
                    </button>
                    <button onclick="logout()" class="text-gray-500 hover:text-red-500 px-3 py-2">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <!-- Área de Trabalho -->
            <div id="main-content" class="flex-1 overflow-y-auto p-4 sm:p-6 no-scrollbar">
                <!-- Conteúdo injetado via JS (Visão Mensal ou Visão de Resumo) -->
            </div>
        </main>
    </div>

    <!-- RODAPÉ PARA LOG DE EVENTOS (ERROS) -->
    <div id="error-log" class="hidden fixed bottom-0 left-0 w-full bg-red-600 text-white p-3 text-sm flex justify-between items-center z-50 shadow-lg">
        <span id="error-message" class="font-mono"></span>
        <button onclick="document.getElementById('error-log').classList.add('hidden')" class="text-white hover:text-gray-200 font-bold px-2">&times;</button>
    </div>

    <script>
        /* =========================================================
           1. CONFIGURAÇÃO DO FIREBASE (COLE SUAS CREDENCIAIS AQUI)
           ========================================================= */
        const firebaseConfig = {
            apiKey: "AIzaSyDyYWoV-6SSSevfxKpiA3MSpO9ISKGQAQI",
            authDomain: "controle-de-horas-7a207.firebaseapp.com",
            projectId: "controle-de-horas-7a207",
            storageBucket: "controle-de-horas-7a207.firebasestorage.app",
            messagingSenderId: "125463674548",
            appId: "1:125463674548:web:4819cc4c9d3a42959be1e1",
            measurementId: "G-J1SZKGD624"
        };

        // Inicialização
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        /* =========================================================
           2. SISTEMA DE LOG DE EVENTOS
           ========================================================= */
        function showErrorLog(message, error) {
            const logDiv = document.getElementById('error-log');
            const msgSpan = document.getElementById('error-message');
            msgSpan.textContent = `[ERRO] ${message}: ${error.message || error}`;
            logDiv.classList.remove('hidden');
            console.error(message, error);
            setTimeout(() => logDiv.classList.add('hidden'), 10000);
        }

        function withLog(fn, errorMessage) {
            return async function(...args) {
                try {
                    return await fn(...args);
                } catch (error) {
                    showErrorLog(errorMessage, error);
                }
            };
        }

        /* =========================================================
           3. VARIÁVEIS DE ESTADO E AUXILIARES
           ========================================================= */
        let currentUser = null;
        let appData = {
            "2026": {
                "Janeiro": { rate: 50, selectedHours: ["08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"], records: [] }
            }
        };
        let currentYear = "2026";
        let currentMonth = "Janeiro";
        let currentSelectedDay = 1;

        const allAvailableHours = Array.from({length: 17}, (_, i) => `${String(i + 6).padStart(2, '0')}:00`);
        const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        /* =========================================================
           4. AUTENTICAÇÃO
           ========================================================= */
        const handleLogin = withLog(async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if (email !== "rebecaxiomi@gmail.com") {
                showErrorLog("Acesso negado", "Este e-mail não possui permissão de acesso a esta aplicação.");
                return;
            }

            await auth.signInWithEmailAndPassword(email, pass);
        }, "Falha ao realizar login. Verifique as credenciais digitadas.");

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                loadDataFromCloud();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        const logout = () => auth.signOut();

        /* =========================================================
           5. BANCO DE DADOS (Firestore)
           ========================================================= */
        const saveDataToCloud = withLog(async () => {
            if (!currentUser) return;
            await db.collection('users').doc(currentUser.uid).set({ data: JSON.stringify(appData) });
            updateSidebar();
        }, "Falha ao salvar dados na nuvem");

        const loadDataFromCloud = withLog(async () => {
            if (!currentUser) return;
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists && doc.data().data) {
                appData = JSON.parse(doc.data().data);
            }
            updateSidebar();
            renderMonthView();
        }, "Falha ao carregar dados da nuvem");

        /* =========================================================
           6. INTERFACE DE USUÁRIO E BARRA LATERAL
           ========================================================= */
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (window.innerWidth < 1024) {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            } else {
                sidebar.classList.toggle('sidebar-closed-desktop');
            }
        }

        const toggleTheme = withLog(() => {
            document.documentElement.classList.toggle('dark');
        }, "Erro ao alternar tema");

        document.addEventListener('click', function(event) {
            const btn = document.getElementById('btn-hours-dropdown');
            const dropdown = document.getElementById('hours-dropdown');
            if (btn && dropdown && !btn.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        window.toggleYearCollapse = function(year) {
            const list = document.getElementById(`list-year-${year}`);
            const icon = document.getElementById(`icon-year-${year}`);
            if(list.classList.contains('hidden')) {
                list.classList.remove('hidden');
                icon.classList.remove('-rotate-90');
            } else {
                list.classList.add('hidden');
                icon.classList.add('-rotate-90');
            }
        };

        const updateSidebar = withLog(() => {
            const container = document.getElementById('sidebar-content');
            
            container.innerHTML = `
                <button onclick="renderSummaryView()" class="w-full mb-6 bg-indigo-50 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300 p-3 rounded-lg shadow-sm border border-indigo-100 dark:border-indigo-800 flex justify-center items-center gap-2 hover:bg-indigo-100 dark:hover:bg-indigo-900/60 transition font-semibold">
                    <i class="fas fa-filter"></i> Filtros e Resumos
                </button>

                <div class="mb-4 flex justify-between items-center px-1 border-b border-gray-200 dark:border-gray-700 pb-2">
                    <span class="font-bold text-gray-700 dark:text-gray-300">Anos Cadastrados</span>
                    <button onclick="addYear()" class="text-sm text-white bg-primary hover:bg-blue-600 px-2 py-1 rounded flex items-center gap-1 transition shadow">
                        <i class="fas fa-plus"></i> Ano
                    </button>
                </div>
            `;
            
            for (const year in appData) {
                const yearDiv = document.createElement('div');
                yearDiv.className = 'mb-6 bg-gray-50 dark:bg-gray-800 p-2 rounded-lg border border-gray-100 dark:border-gray-700 text-gray-900 dark:text-gray-100 shadow-sm';
                
                yearDiv.innerHTML = `
                    <div class="flex justify-between items-center cursor-pointer mb-2 px-1" onclick="toggleYearCollapse('${year}')">
                        <h3 class="font-bold text-primary text-lg">${year}</h3>
                        <i id="icon-year-${year}" class="fas fa-chevron-down text-primary transition-transform duration-300"></i>
                    </div>
                `;
                
                const monthListContainer = document.createElement('div');
                monthListContainer.id = `list-year-${year}`;
                monthListContainer.className = "transition-all duration-300"; 
                
                const monthList = document.createElement('ul');
                monthList.className = 'space-y-1';

                for (const month in appData[year]) {
                    const li = document.createElement('li');
                    li.className = 'flex justify-between items-center p-2 rounded hover:bg-white dark:hover:bg-gray-700 cursor-pointer transition shadow-sm border border-transparent dark:border-gray-700';
                    li.innerHTML = `
                        <span onclick="selectMonth('${year}', '${month}')" class="flex-1 font-medium text-gray-700 dark:text-gray-300">${month}</span>
                        <div class="flex gap-2">
                            <button onclick="editMonth('${year}', '${month}')" class="text-blue-400 hover:text-blue-600 text-sm"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteMonth('${year}', '${month}')" class="text-red-400 hover:text-red-600 text-sm"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    monthList.appendChild(li);
                }
                
                const addBtn = document.createElement('button');
                addBtn.className = 'mt-3 text-sm text-gray-600 dark:text-gray-400 hover:text-primary w-full text-center border border-dashed border-gray-300 dark:border-gray-600 p-1 rounded transition';
                addBtn.innerHTML = '<i class="fas fa-plus"></i> Adicionar Mês';
                addBtn.onclick = () => addMonth(year);

                monthListContainer.appendChild(monthList);
                monthListContainer.appendChild(addBtn);
                yearDiv.appendChild(monthListContainer);
                
                container.appendChild(yearDiv);
            }

            updateSidebarSummary();
        }, "Erro ao atualizar barra lateral");

        const updateSidebarSummary = () => {
            let totalH = 0;
            let totalG = 0;
            let label = "Nenhum mês selecionado";

            if (currentYear && currentMonth && appData[currentYear] && appData[currentYear][currentMonth]) {
                const mData = appData[currentYear][currentMonth];
                totalH = mData.records ? mData.records.length : 0;
                totalG = totalH * (mData.rate || 0);
                label = `Resumo: ${currentMonth} / ${currentYear}`;
            }

            document.getElementById('summary-label').innerText = label;
            document.getElementById('total-hours').innerText = totalH;
            document.getElementById('total-earned').innerText = totalG.toFixed(2).replace('.', ',');
        };

        const addYear = withLog(async () => {
            const yearName = prompt("Digite o ano (ex: 2026):");
            if (yearName && yearName.trim() !== "" && !appData[yearName]) {
                appData[yearName] = {};
                await saveDataToCloud();
            }
        }, "Erro ao adicionar ano");

        const addMonth = withLog(async (year) => {
            const monthName = prompt("Digite o nome do mês (ex: Fevereiro):");
            if (monthName && monthName.trim() !== "" && !appData[year][monthName]) {
                appData[year][monthName] = { rate: 0, selectedHours: [], records: [] };
                await saveDataToCloud();
            }
        }, "Erro ao adicionar mês");

        const editMonth = withLog(async (year, oldMonth) => {
            const newMonth = prompt("Digite o novo nome do mês:", oldMonth);
            if (newMonth && newMonth.trim() !== "" && newMonth !== oldMonth && !appData[year][newMonth]) {
                appData[year][newMonth] = appData[year][oldMonth];
                delete appData[year][oldMonth];
                if (currentMonth === oldMonth) currentMonth = newMonth;
                await saveDataToCloud();
            }
        }, "Erro ao editar mês");

        const deleteMonth = withLog(async (year, month) => {
            if (confirm(`Tem certeza que deseja excluir os dados de ${month}/${year}?`)) {
                delete appData[year][month];
                if (currentMonth === month) { currentMonth = null; document.getElementById('main-content').innerHTML = ''; }
                await saveDataToCloud();
            }
        }, "Erro ao excluir mês");

        const selectMonth = withLog((year, month) => {
            currentYear = year;
            currentMonth = month;
            currentSelectedDay = 1;
            if(window.innerWidth < 1024) toggleSidebar();
            renderMonthView();
        }, "Erro ao selecionar mês");

        const clearMonthData = withLog(async () => {
            if (confirm(`Limpar todos os registros de ${currentMonth}?`)) {
                appData[currentYear][currentMonth].records = [];
                await saveDataToCloud();
                renderMonthView();
            }
        }, "Erro ao limpar dados do mês");

        function getDayOfWeek(year, monthIndex, day) {
            const date = new Date(year, monthIndex, day);
            const days = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
            return days[date.getDay()];
        }

        function changeDay(day) {
            currentSelectedDay = parseInt(day);
            renderMonthView();
        }

        /* =========================================================
           7. RENDERIZAÇÃO: MÊS ATUAL
           ========================================================= */
        const renderMonthView = withLog(() => {
            const main = document.getElementById('main-content');
            
            updateSidebarSummary();

            if (!currentMonth || !appData[currentYear][currentMonth]) {
                main.innerHTML = '<div class="text-center text-gray-500 mt-10">Selecione ou crie um ano e um mês na aba lateral.</div>';
                document.getElementById('current-view-title').innerText = "Bem-vindo";
                return;
            }

            const data = appData[currentYear][currentMonth];
            document.getElementById('current-view-title').innerText = `${currentMonth} de ${currentYear}`;

            const mIndex = monthNames.findIndex(m => m.toLowerCase() === currentMonth.toLowerCase());
            const maxDays = mIndex >= 0 ? new Date(parseInt(currentYear), mIndex + 1, 0).getDate() : 31;
            
            if (currentSelectedDay > maxDays) currentSelectedDay = maxDays;

            let dayOptions = '';
            for(let i = 1; i <= maxDays; i++) {
                const dow = mIndex >= 0 ? getDayOfWeek(parseInt(currentYear), mIndex, i) : "";
                const label = `Dia ${String(i).padStart(2, '0')} - ${dow}`;
                dayOptions += `<option value="${i}" ${i === currentSelectedDay ? 'selected' : ''}>${label}</option>`;
            }

            let html = `
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mb-6 flex flex-col sm:flex-row gap-4 items-end">
                    <div class="w-full sm:w-1/3">
                        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Valor da Hora (R$)</label>
                        <input type="number" id="input-rate" value="${data.rate}" onchange="updateMonthRate()" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-1 focus:ring-primary">
                    </div>
                    
                    <div class="w-full sm:w-1/3 relative">
                        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Horas de Aula no Checklist</label>
                        <button id="btn-hours-dropdown" onclick="document.getElementById('hours-dropdown').classList.toggle('hidden')" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 outline-none text-left flex justify-between items-center bg-white dark:bg-gray-700">
                            <span>Selecionar Horas (${(data.selectedHours || []).length})</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div id="hours-dropdown" class="hidden absolute z-50 w-full mt-1 bg-white dark:bg-gray-800 border dark:border-gray-600 shadow-lg rounded max-h-48 overflow-y-auto p-2">
                            ${allAvailableHours.map(hr => `
                                <label class="flex items-center gap-2 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded cursor-pointer">
                                    <input type="checkbox" ${data.selectedHours && data.selectedHours.includes(hr) ? 'checked' : ''} onchange="toggleMonthHour('${hr}', this.checked)" class="w-4 h-4 text-primary rounded">
                                    <span>${hr}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>

                    <div class="w-full sm:w-1/3 flex justify-end">
                        <button onclick="clearMonthData()" class="bg-red-50 text-red-600 hover:bg-red-100 dark:bg-red-900/30 dark:hover:bg-red-900/50 px-4 py-2 rounded shadow-sm transition w-full sm:w-auto">
                            <i class="fas fa-trash-alt"></i> Limpar Dados
                        </button>
                    </div>
                </div>

                <div class="mb-4 flex items-center gap-3">
                    <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">Selecione o Dia:</label>
                    <select id="day-selector" onchange="changeDay(this.value)" class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-1 focus:ring-primary bg-white dark:bg-gray-800 shadow-sm w-48 font-medium">
                        ${dayOptions}
                    </select>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead>
                            <tr class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600 text-sm">
                                <th class="p-4 w-48">Data / Dia</th>
                                <th class="p-4">Checklist de Aulas & Observações</th>
                                <th class="p-4 w-24 text-center">Total Aulas</th>
                                <th class="p-4 w-32 text-right">Ganho (R$)</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            const recordsDia = data.records.filter(r => parseInt(r.dia) === parseInt(currentSelectedDay)) || [];
            const qtdHoras = recordsDia.length;
            const ganhoDia = qtdHoras * data.rate;
            const selectedHours = data.selectedHours || [];
            const dow = mIndex >= 0 ? getDayOfWeek(parseInt(currentYear), mIndex, currentSelectedDay) : "";

            let hoursHtml = selectedHours.map(hr => {
                const rec = recordsDia.find(r => r.hora === hr);
                const isChecked = !!rec;
                const obs = rec ? rec.obs : '';
                return `
                    <div class="flex items-center gap-3 mb-2 p-1 rounded hover:bg-gray-50 dark:hover:bg-gray-750 transition">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleHourRecord(${currentSelectedDay}, '${hr}', this.checked)" class="w-5 h-5 text-primary rounded cursor-pointer">
                        <span class="w-16 font-mono text-sm font-semibold ${isChecked ? 'text-primary' : 'text-gray-500'}">${hr}</span>
                        <input type="text" placeholder="Observação da aula..." value="${obs}" ${!isChecked ? 'disabled' : ''} onchange="updateRecordObs(${currentSelectedDay}, '${hr}', this.value)" class="flex-1 p-2 text-sm border rounded bg-transparent dark:border-gray-600 focus:outline-none focus:border-primary ${!isChecked ? 'opacity-40 cursor-not-allowed' : 'bg-white dark:bg-gray-700'}">
                    </div>
                `;
            }).join('');

            if(selectedHours.length === 0) {
                hoursHtml = '<div class="text-sm text-gray-500 p-2 italic">Nenhuma hora selecionada nas configurações do mês.</div>';
            }

            html += `
                            <tr class="border-b border-gray-100 dark:border-gray-700">
                                <td class="p-4 font-bold text-gray-700 dark:text-gray-300 align-top text-lg">
                                    Dia ${String(currentSelectedDay).padStart(2, '0')}
                                    <span class="block text-sm font-normal text-gray-500">${dow}</span>
                                </td>
                                <td class="p-4 align-top">
                                    <div class="space-y-1">
                                        ${hoursHtml}
                                    </div>
                                </td>
                                <td class="p-4 text-center font-bold text-gray-600 dark:text-gray-400 align-top text-lg">${qtdHoras}</td>
                                <td class="p-4 text-right font-bold text-green-600 dark:text-green-400 align-top text-lg">${ganhoDia.toFixed(2).replace('.', ',')}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
            main.innerHTML = html;
        }, "Erro ao renderizar a tela do mês");

        const updateMonthRate = withLog(async () => {
            const rate = parseFloat(document.getElementById('input-rate').value) || 0;
            appData[currentYear][currentMonth].rate = rate;
            await saveDataToCloud();
            renderMonthView();
        }, "Erro ao atualizar valor da hora");

        const toggleMonthHour = withLog(async (hr, isChecked) => {
            const data = appData[currentYear][currentMonth];
            if (!data.selectedHours) data.selectedHours = [];
            
            if (isChecked) {
                if (!data.selectedHours.includes(hr)) data.selectedHours.push(hr);
            } else {
                data.selectedHours = data.selectedHours.filter(h => h !== hr);
                data.records = data.records.filter(r => r.hora !== hr);
            }
            
            data.selectedHours.sort();
            await saveDataToCloud();
            renderMonthView();
        }, "Erro ao configurar horas do mês");

        const toggleHourRecord = withLog(async (dia, hora, isChecked) => {
            const records = appData[currentYear][currentMonth].records;
            if (isChecked) {
                if (!records.find(r => r.dia === dia && r.hora === hora)) {
                    records.push({ dia: dia, hora: hora, obs: "" });
                }
            } else {
                const idx = records.findIndex(r => r.dia === dia && r.hora === hora);
                if (idx > -1) records.splice(idx, 1);
            }
            await saveDataToCloud();
            renderMonthView();
        }, "Erro ao registrar hora");

        const updateRecordObs = withLog(async (dia, hora, obs) => {
            const record = appData[currentYear][currentMonth].records.find(r => r.dia === dia && r.hora === hora);
            if (record) {
                record.obs = obs;
                await saveDataToCloud();
            }
        }, "Erro ao atualizar observação");

        /* =========================================================
           8. RENDERIZAÇÃO: FILTROS E RESUMOS AVANÇADOS
           ========================================================= */
        const renderSummaryView = withLog(() => {
            if(window.innerWidth < 1024) toggleSidebar();
            
            const main = document.getElementById('main-content');
            document.getElementById('current-view-title').innerText = "Filtros e Resumos";

            const years = Object.keys(appData);
            if (years.length === 0) {
                main.innerHTML = '<div class="text-center text-gray-500 mt-10">Nenhum dado encontrado para gerar relatórios.</div>';
                return;
            }

            const selYear = years.includes(currentYear) ? currentYear : years[0];
            
            let html = `
                <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mb-6">
                    <h3 class="font-bold mb-4 text-gray-700 dark:text-gray-300 border-b border-gray-100 dark:border-gray-700 pb-2">Configurar Filtro</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-2">Ano base</label>
                            <select id="filter-year" onchange="updateFilterMonths()" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-1 focus:ring-primary bg-white dark:bg-gray-800">
                                ${years.map(y => `<option value="${y}" ${y === selYear ? 'selected' : ''}>${y}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-2">Dia Inicial</label>
                            <input type="number" id="filter-start-day" value="1" min="1" max="31" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-1 focus:ring-primary bg-white dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-2">Dia Final</label>
                            <input type="number" id="filter-end-day" value="31" min="1" max="31" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-1 focus:ring-primary bg-white dark:bg-gray-800">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-3">Meses para análise (Marque os desejados)</label>
                        <div id="filter-months-container" class="flex flex-wrap gap-3">
                        </div>
                    </div>

                    <div class="flex justify-end mt-4">
                        <button onclick="executeFilter()" class="bg-primary hover:bg-blue-600 text-white px-6 py-2 rounded shadow transition flex items-center gap-2">
                            <i class="fas fa-search"></i> Gerar Resumo
                        </button>
                    </div>
                </div>

                <div id="filter-results"></div>
            `;
            
            main.innerHTML = html;
            updateFilterMonths(); 
            executeFilter(); 
        }, "Erro ao abrir tela de Resumos");

        window.updateFilterMonths = function() {
            const year = document.getElementById('filter-year').value;
            const container = document.getElementById('filter-months-container');
            const months = Object.keys(appData[year] || {});
            
            if(months.length === 0) {
                container.innerHTML = '<span class="text-sm text-gray-500 italic">Nenhum mês cadastrado neste ano.</span>';
                return;
            }

            container.innerHTML = months.map(m => `
                <label class="flex items-center gap-2 px-3 py-2 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                    <input type="checkbox" value="${m}" class="filter-month w-4 h-4 text-primary rounded" checked>
                    <span class="text-sm font-medium dark:text-gray-200">${m}</span>
                </label>
            `).join('');
        };

        window.executeFilter = function() {
            const year = document.getElementById('filter-year').value;
            const startDay = parseInt(document.getElementById('filter-start-day').value) || 1;
            const endDay = parseInt(document.getElementById('filter-end-day').value) || 31;
            
            const monthCheckboxes = document.querySelectorAll('.filter-month:checked');
            const selectedMonths = Array.from(monthCheckboxes).map(cb => cb.value);

            let totalH = 0;
            let totalG = 0;
            let tablesHtml = '';

            selectedMonths.forEach(month => {
                const mData = appData[year][month];
                if(mData && mData.records) {
                    const filteredRecords = mData.records.filter(r => parseInt(r.dia) >= startDay && parseInt(r.dia) <= endDay);
                    
                    if(filteredRecords.length > 0) {
                        const mIndex = monthNames.findIndex(mName => mName.toLowerCase() === month.toLowerCase());
                        
                        const subTotalH = filteredRecords.length;
                        const subTotalG = subTotalH * mData.rate;
                        
                        totalH += subTotalH;
                        totalG += subTotalG;

                        filteredRecords.sort((a, b) => {
                            if (a.dia !== b.dia) return a.dia - b.dia;
                            return a.hora.localeCompare(b.hora);
                        });

                        tablesHtml += `
                            <div class="mb-6">
                                <div class="flex justify-between items-end mb-2">
                                    <h4 class="font-bold text-gray-700 dark:text-gray-300 text-lg">${month} <span class="text-sm font-normal text-gray-500">(Valor base: R$ ${mData.rate}/aula)</span></h4>
                                    <span class="text-sm font-semibold text-green-600 dark:text-green-400">Subtotal: R$ ${subTotalG.toFixed(2).replace('.', ',')}</span>
                                </div>
                                
                                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                                    <table class="w-full text-left border-collapse text-sm">
                                        <thead>
                                            <tr class="bg-gray-50 dark:bg-gray-750 border-b border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400">
                                                <th class="p-3 w-32 font-semibold">Dia</th>
                                                <th class="p-3 w-28 font-semibold">Hora</th>
                                                <th class="p-3 font-semibold">Observação</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${filteredRecords.map(r => {
                                                const dow = mIndex >= 0 ? getDayOfWeek(parseInt(year), mIndex, r.dia) : "";
                                                return `
                                                <tr class="border-b border-gray-100 dark:border-gray-750 hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                                    <td class="p-3 font-medium text-gray-700 dark:text-gray-300">${String(r.dia).padStart(2, '0')} - ${dow}</td>
                                                    <td class="p-3 font-mono text-primary">${r.hora}</td>
                                                    <td class="p-3 text-gray-600 dark:text-gray-400">${r.obs || '<span class="italic opacity-50">Sem observação</span>'}</td>
                                                </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        `;
                    }
                }
            });

            if(totalH === 0) {
                tablesHtml = '<div class="text-center text-gray-500 py-10 bg-white dark:bg-gray-800 rounded-xl border border-dashed border-gray-300 dark:border-gray-700">Nenhum registro encontrado para o período filtrado.</div>';
            }

            const resultsContainer = document.getElementById('filter-results');
            resultsContainer.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="bg-blue-50 dark:bg-blue-900/30 p-5 rounded-xl border border-blue-100 dark:border-blue-800 flex items-center justify-between shadow-sm">
                        <div>
                            <p class="text-sm text-blue-600 dark:text-blue-400 font-semibold mb-1 uppercase tracking-wide">Total de Aulas</p>
                            <p class="text-3xl font-bold text-blue-800 dark:text-blue-300">${totalH}</p>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 dark:bg-blue-800 text-blue-600 dark:text-blue-300 rounded-full flex items-center justify-center text-xl">
                            <i class="fas fa-chalkboard-teacher"></i>
                        </div>
                    </div>
                    <div class="bg-green-50 dark:bg-green-900/30 p-5 rounded-xl border border-green-100 dark:border-green-800 flex items-center justify-between shadow-sm">
                        <div>
                            <p class="text-sm text-green-600 dark:text-green-400 font-semibold mb-1 uppercase tracking-wide">Total Ganho</p>
                            <p class="text-3xl font-bold text-green-800 dark:text-green-300">R$ ${totalG.toFixed(2).replace('.', ',')}</p>
                        </div>
                        <div class="w-12 h-12 bg-green-100 dark:bg-green-800 text-green-600 dark:text-green-300 rounded-full flex items-center justify-center text-xl">
                            <i class="fas fa-sack-dollar"></i>
                        </div>
                    </div>
                </div>

                ${tablesHtml}
            `;
        };

        /* =========================================================
           9. EXPORTAÇÃO (Excel e PDF)
           ========================================================= */
        const exportToXLS = withLog(() => {
            const ws_data = [["Ano", "Mês", "Dia", "Dia da Semana", "Hora", "Observação", "Valor (R$)"]];
            
            for (const year in appData) {
                for (const month in appData[year]) {
                    const monthData = appData[year][month];
                    const mIndex = monthNames.findIndex(m => m.toLowerCase() === month.toLowerCase());
                    
                    if (monthData.records) {
                        monthData.records.forEach(rec => {
                            const dow = mIndex >= 0 ? getDayOfWeek(parseInt(year), mIndex, rec.dia) : "";
                            ws_data.push([year, month, rec.dia, dow, rec.hora, rec.obs, monthData.rate]);
                        });
                    }
                }
            }

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, "Relatório Anual");
            XLSX.writeFile(wb, "Resumo_Aulas.xlsx");
        }, "Erro ao exportar planilha XLS");

        const exportToPDF = withLog(() => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.text("Resumo Anual - Controle de Aulas", 14, 20);
            
            const head = [["Ano", "Mês", "Dia", "Semana", "Hora", "Observação", "Valor (R$)"]];
            const body = [];
            
            for (const year in appData) {
                for (const month in appData[year]) {
                    const monthData = appData[year][month];
                    const mIndex = monthNames.findIndex(m => m.toLowerCase() === month.toLowerCase());
                    
                    if (monthData.records) {
                        monthData.records.forEach(rec => {
                            const dow = mIndex >= 0 ? getDayOfWeek(parseInt(year), mIndex, rec.dia) : "";
                            body.push([year, month, rec.dia, dow, rec.hora, rec.obs, `R$ ${parseFloat(monthData.rate).toFixed(2)}`]);
                        });
                    }
                }
            }
            
            doc.autoTable({
                head: head,
                body: body,
                startY: 30,
                styles: { fontSize: 10 },
                headStyles: { fillColor: [37, 99, 235] }
            });
            
            doc.save("Resumo_Aulas.pdf");
        }, "Erro ao exportar PDF");

    </script>

    <!-- Registro do Service Worker (PWA) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .catch(err => console.error('Erro ao registrar Service Worker:', err));
        });
      }
    </script>
</body>
</html>
